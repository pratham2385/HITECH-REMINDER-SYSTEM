{% extends "base.html" %}
{% block content %}
<section class="page-heading">
  <div>
    <h1>Edit User</h1>
    <p>Manage dashboard role access.</p>
  </div>
</section>

<section class="panel">
  <form method="post" class="form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      Username / Email
      <input type="text" name="username" value="{{ account.username }}" required>
    </label>
    <label>
      Display Name
      <input type="text" name="display_name" value="{{ account.display_name }}" required>
    </label>
    <label>
      Role
      <select name="role">
        {% for role in roles %}
          <option value="{{ role }}" {% if account.role == role %}selected{% endif %}>{{ role|title }}</option>
        {% endfor %}
      </select>
    </label>
      <label class="check-row">
        <input type="checkbox" name="is_active" value="true" {% if account.is_active %}checked{% endif %}>
        Active
      </label>
    <label class="span-2">
      Password
      <input type="password" name="password" placeholder="Leave blank to keep current password">
    </label>
    <div class="form-actions">
      <button type="submit" class="button primary">Save User</button>
      <a href="/users" class="button ghost">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
