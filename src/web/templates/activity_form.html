{% extends "base.html" %}
{% block content %}
<section class="page-heading">
  <div>
    <h1>{% if activity %}Edit Activity{% else %}New Activity{% endif %}</h1>
    <p>Configure reminder schedules and email templates.</p>
  </div>
</section>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

  <!-- Section 1: General Information -->
  <section class="panel" style="max-width: 900px;">
    <div class="panel-head">
      <h2 style="display: flex; align-items: center; gap: 8px;">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--primary);"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        General Information
      </h2>
    </div>
    <div class="form-grid">
      <label class="span-2">
        Activity Name
        <input type="text" name="activity" value="{{ activity.activity if activity else '' }}" required placeholder="e.g. Monthly Tax Filing">
      </label>
      
      <label>
        Assigned User
        <select name="assigned_user_id">
          <option value="">None (Global Config)</option>
          {% for u in users %}
            <option value="{{ u.id }}" {% if activity and activity.assigned_user_id == u.id %}selected{% endif %}>{{ u.display_name }} ({{ u.email }})</option>
          {% endfor %}
        </select>
        <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 4px;">User responsible for this activity.</span>
      </label>

      <label>
        Linked Module
        <select name="linked_module_id">
          <option value="">None</option>
          {% for module in modules %}
            <option value="{{ module.id }}" {% if activity and activity.linked_module_id == module.id %}selected{% endif %}>{{ module.name }}</option>
          {% endfor %}
        </select>
      </label>
      
      <label>
        Status
        <input type="text" name="status" value="{{ activity.status if activity else '' }}" placeholder="e.g. Pending, Done">
      </label>
      
      <label>
        External Link
        <input type="text" name="link" value="{{ activity.link if activity else '' }}" placeholder="https://...">
      </label>

      <label class="span-2">
        Remark
        <textarea name="remark" rows="2" placeholder="Internal notes...">{{ activity.remark if activity else '' }}</textarea>
      </label>
    </div>
  </section>

  <!-- Section 2: Scheduling Configuration -->
  <section class="panel" style="max-width: 900px;">
    <div class="panel-head">
      <h2 style="display: flex; align-items: center; gap: 8px;">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--primary);"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        Scheduling Configuration
      </h2>
    </div>
    
    <div class="form-grid">
      <label>
        Frequency
        <select name="frequency" required>
          {% for item in frequencies %}
            <option value="{{ item }}" {% if activity and activity.frequency == item %}selected{% endif %}>{{ item }}</option>
          {% endfor %}
        </select>
      </label>
      
      <label>
        Timezone
        <select name="timezone" required>
          <option value="UTC" {% if activity and activity.timezone == 'UTC' %}selected{% endif %}>UTC</option>
          <option value="Asia/Kolkata" {% if activity and activity.timezone == 'Asia/Kolkata' %}selected{% endif %}>Asia/Kolkata (IST)</option>
          <option value="America/New_York" {% if activity and activity.timezone == 'America/New_York' %}selected{% endif %}>America/New_York (EST)</option>
        </select>
      </label>
      
      <label>
        Send Time (HH:MM)
        <input type="time" name="send_time" value="{{ activity.send_time if activity else '09:00' }}" required>
      </label>

      <label>
        Date Handling Strategy
        <select name="date_handling_strategy">
          <option value="exact" {% if activity and activity.date_handling_strategy == 'exact' %}selected{% endif %}>Exact Date</option>
          <option value="last_valid_day" {% if activity and activity.date_handling_strategy == 'last_valid_day' %}selected{% endif %}>Last Valid Day (e.g. Feb 28 if 31 selected)</option>
        </select>
      </label>
    </div>
    
    <!-- Advanced Calendar Row -->
    <div class="form-grid" style="margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border-color);">
      <label>
        Day of Week
        <select name="day_of_week" id="input_day">
          <option value="">None</option>
          {% for day in ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'] %}
          <option value="{{ day }}" {% if activity and activity.day_of_week == day %}selected{% endif %}>{{ day }}</option>
          {% endfor %}
        </select>
        <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 4px;">For Weekly</span>
      </label>
      
      <label>
        Day of Month (1-31)
        <input type="number" id="input_date" name="day_of_month" value="{{ activity.day_of_month if activity else '' }}" min="1" max="31">
        <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 4px;">For Monthly/Yearly</span>
      </label>
      
      <label>
        Month of Year
        <select name="month_of_year" id="input_month">
          <option value="">None</option>
          {% set months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'] %}
          {% for i in range(12) %}
            <option value="{{ i + 1 }}" {% if activity and activity.month_of_year == i + 1 %}selected{% endif %}>{{ months[i] }}</option>
          {% endfor %}
        </select>
        <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 4px;">For Yearly</span>
      </label>
      
      <label>
        Year
        <input type="number" id="input_year" name="year" value="{{ activity.year if activity else '' }}" min="2020" max="2050" placeholder="e.g. 2026">
        <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 4px;">For One Time</span>
      </label>
    </div>

    <!-- Quarter Config -->
    <div class="form-grid" style="margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border-color);">
      <label class="span-2">
        Quarter Months
        <select name="quarter_months" multiple style="height: 100px;">
          {% set q_months = (activity.quarter_months.split(',') if activity and activity.quarter_months else []) %}
          {% set months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'] %}
          {% for i in range(12) %}
            <option value="{{ i + 1 }}" {% if (i + 1)|string in q_months %}selected{% endif %}>{{ months[i] }}</option>
          {% endfor %}
        </select>
        <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 4px;">Hold Ctrl/Cmd to select multiple. Used for Quarterly / Half-Yearly.</span>
      </label>
      <label style="display:none;">
        <input type="text" name="date_value" value="{{ activity.date_value if activity else '' }}">
      </label>
    </div>
  </section>

  <!-- Section 3: Email Templates -->
  <section class="panel" style="max-width: 900px;">
    <div class="panel-head">
      <h2 style="display: flex; align-items: center; gap: 8px;">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--primary);"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        Email Templates
      </h2>
    </div>
    
    <div class="form-grid">
      <label class="span-2">
        Custom Email Subject
        <input type="text" name="email_subject_template" value="{{ activity.email_subject_template if activity else '' }}" placeholder="Reminder: {{ '{{activity_name}}' }}">
      </label>
      <label class="span-2">
        Custom Email Body (Markdown/Text)
        <textarea name="email_body_template" rows="5" placeholder="Hello {{ '{{user_name}}' }},\n\nReminder for {{ '{{activity_name}}' }}">{{ activity.email_body_template if activity else '' }}</textarea>
      </label>
    </div>

    <!-- Form Actions -->
    <div class="form-actions" style="margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 24px; display:flex; justify-content:flex-end;">
      <a href="/activities" class="button ghost">Cancel</a>
      <button type="submit" class="button primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:4px;"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
        Save Schedule
      </button>
    </div>
  </section>

</form>

<script>
// Validates calendar dates visually so user gets instant feedback
document.addEventListener("DOMContentLoaded", function() {
    const dayInput = document.getElementById("input_day");
    const dateInput = document.getElementById("input_date");
    const monthInput = document.getElementById("input_month");
    const yearInput = document.getElementById("input_year");

    function syncDayOfWeek() {
        const d = parseInt(dateInput.value);
        const m = parseInt(monthInput.value);
        const y = parseInt(yearInput.value);

        if (d && m && y) {
            const dateObj = new Date(y, m - 1, d);
            if (dateObj.getFullYear() === y && dateObj.getMonth() === m - 1 && dateObj.getDate() === d) {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const dayName = days[dateObj.getDay()];
                
                if (dayInput.value !== dayName) {
                    dayInput.value = dayName;
                }
                dateInput.setCustomValidity("");
            } else {
                dateInput.setCustomValidity("Invalid calendar date (e.g. 31 April or 29 Feb in non-leap year).");
                dateInput.reportValidity();
            }
        } else {
            dateInput.setCustomValidity("");
        }
    }

    dateInput.addEventListener("input", syncDayOfWeek);
    monthInput.addEventListener("change", syncDayOfWeek);
    yearInput.addEventListener("input", syncDayOfWeek);
    
    dayInput.addEventListener("change", function() {
        const d = parseInt(dateInput.value);
        const m = parseInt(monthInput.value);
        const y = parseInt(yearInput.value);
        if (d && m && y) {
             const dateObj = new Date(y, m - 1, d);
             if (dateObj.getFullYear() === y && dateObj.getMonth() === m - 1 && dateObj.getDate() === d) {
                 const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                 const dayName = days[dateObj.getDay()];
                 if (dayInput.value && dayInput.value !== dayName) {
                     dayInput.setCustomValidity("Selected day does not match the selected date (" + dayName + ").");
                     dayInput.reportValidity();
                 } else {
                     dayInput.setCustomValidity("");
                 }
             }
        } else {
            dayInput.setCustomValidity("");
        }
    });
    
    syncDayOfWeek();
});
</script>
{% endblock %}
